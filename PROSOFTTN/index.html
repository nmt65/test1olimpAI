<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Verdict • Autentificare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* (lasă stilurile tale existente, nu le modific) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .auth-container {
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .box {
            background: rgba(15, 25, 45, 0.9);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(245, 158, 11, 0.3);
            border-radius: 48px;
            padding: 2.8rem 2.5rem;
            box-shadow: 0 30px 60px -20px #000;
            color: #e1e7f5;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #fcd34d, #f59e0b);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        h1 i {
            color: #f59e0b;
            -webkit-text-fill-color: initial;
            margin-right: 10px;
        }
        .input-icon {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .input-icon i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #f59e0b;
            font-size: 1.2rem;
        }
        .input-icon input {
            width: 100%;
            padding: 1rem 1rem 1rem 3.2rem;
            background: #1e2b41;
            border: 2px solid #2f405c;
            border-radius: 60px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: 0.2s;
        }
        .input-icon input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }
        .toggle-eye {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #b9c7dd;
            cursor: pointer;
        }
        .auth-btn {
            width: 100%;
            background: #f59e0b;
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            color: #030712;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            transition: 0.2s;
            margin: 1.5rem 0 1rem;
        }
        .auth-btn:hover {
            background: #fbbf24;
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px #f59e0b;
        }
        .auth-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .switch-text {
            text-align: center;
            color: #b9c7dd;
        }
        .switch-btn {
            background: none;
            border: none;
            color: #f59e0b;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: underline;
        }
        .notification {
            padding: 1rem;
            border-radius: 40px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 500;
        }
        .error { background: rgba(220, 38, 38, 0.2); border: 2px solid #dc2626; color: #fca5a5; }
        .success { background: rgba(34, 197, 94, 0.2); border: 2px solid #22c55e; color: #bbf7d0; }
        .info { background: rgba(59, 130, 246, 0.2); border: 2px solid #3b82f6; color: #bfdbfe; }
        .password-strength {
            margin-top: -10px;
            margin-bottom: 1rem;
        }
        .strength-bar {
            height: 6px;
            width: 0%;
            background: #dc2626;
            border-radius: 10px;
            transition: width 0.3s, background 0.3s;
        }
        .strength-text {
            font-size: 0.85rem;
            color: #b9c7dd;
            text-align: right;
        }
        .weak-warning {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid #f59e0b;
            border-radius: 40px;
            padding: 0.8rem;
            margin-bottom: 1rem;
            color: #fcd34d;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .loader {
            border: 3px solid rgba(0,0,0,0.2);
            border-top: 3px solid #030712;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="box">
            <h1><i class="fas fa-scale-balanced"></i> AI Verdict</h1>
            <div id="message" class="notification" style="display: none;"></div>
            
            <form id="auth-form">
                <div id="name-field" style="display: none;">
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="name" placeholder="Numele tău">
                    </div>
                </div>
                
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Parolă" required>
                    <span class="toggle-eye" id="togglePassword"><i class="fas fa-eye"></i></span>
                </div>
                
                <div id="forgot-password-field" style="text-align: right; margin-bottom: 1rem;">
                    <a href="forgor.html" style="color: #f59e0b; text-decoration: none; font-size: 0.9rem; font-weight: 500;">
                        Mi-am uitat parola
                    </a>
                </div>
                
                <div id="strength-container" style="display: none;">
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>
                
                <div id="weak-warning" class="weak-warning" style="display: none;">
                    <i class="fas fa-exclamation-triangle"></i> Parola este prea slabă. Folosește litere mari, cifre și caractere speciale.
                </div>
                
                <div id="confirm-field" style="display: none;">
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirm" placeholder="Confirmă parola">
                        <span class="toggle-eye" id="toggleConfirm"><i class="fas fa-eye"></i></span>
                    </div>
                </div>
                
                <button type="submit" class="auth-btn" id="auth-btn">
                    <i class="fas fa-sign-in-alt"></i> <span id="btn-text">Conectare</span>
                </button>
            </form>
            
            <div class="switch-text">
                <span id="switch-message">Nu ai cont?</span>
                <button class="switch-btn" id="switch-btn">Înregistrează-te</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function() {
        // Înlocuiește cu URL-ul și cheia anonimă corecte din proiectul tău Supabase
        const SUPABASE_URL = "https://gjyaxaodghpzlpuzglcs.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqeWF4YW9kZ2hwemxwdXpnbGNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxOTAzMDEsImV4cCI6MjA4Nzc2NjMwMX0.JWLhsT_EchOT-MwPAzl0AOWsVUKvMnQ_LTyNRQOuk6s";
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            console.error('Supabase initialization failed:', e);
        }

        // Elemente DOM
        const messageDiv = document.getElementById('message');
        const form = document.getElementById('auth-form');
        const nameField = document.getElementById('name-field');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmField = document.getElementById('confirm-field');
        const confirmInput = document.getElementById('confirm');
        const strengthContainer = document.getElementById('strength-container');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        const weakWarning = document.getElementById('weak-warning');
        const authBtn = document.getElementById('auth-btn');
        const btnText = document.getElementById('btn-text');
        const switchMsg = document.getElementById('switch-message');
        const switchBtn = document.getElementById('switch-btn');
        const togglePassword = document.getElementById('togglePassword');
        const toggleConfirm = document.getElementById('toggleConfirm');

        let isLogin = true;

        // Funcții utilitare
        function showMessage(text, type) {
            messageDiv.innerText = text;
            messageDiv.className = `notification ${type}`;
            messageDiv.style.display = 'block';
        }

        function setLoading(loading) {
            if (loading) {
                authBtn.disabled = true;
                authBtn.innerHTML = '<div class="loader"></div> Procesare...';
            } else {
                authBtn.disabled = false;
                const icon = isLogin ? 'fa-sign-in-alt' : 'fa-user-plus';
                const text = isLogin ? 'Conectare' : 'Înregistrare';
                authBtn.innerHTML = `<i class="fas ${icon}"></i> ${text}`;
            }
        }

        // Funcție de verificare email în baza de date
        async function checkEmailExists(email) {
            if (!email) return false;
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('email')
                    .eq('email', email)
                    .maybeSingle();
                
                if (error) {
                    console.error('Eroare la verificarea email:', error);
                    return false;
                }
                return !!data;
            } catch (err) {
                console.error(err);
                return false;
            }
        }

        // Funcție de verificare nume în baza de date
        async function checkNameExists(nume) {
            if (!nume) return false;
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('nume')
                    .eq('nume', nume)
                    .maybeSingle();
                
                if (error) {
                    console.error('Eroare la verificarea numelui:', error);
                    return false;
                }
                return !!data; // true dacă există deja
            } catch (err) {
                console.error(err);
                return false;
            }
        }

        // Verificare email în timp real (la pierderea focusului)
        emailInput.addEventListener('blur', async () => {
            if (isLogin) return;
            const email = emailInput.value.trim();
            if (!email) return;
            
            // Validare format email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('⚠️ Format email invalid.', 'error');
                return;
            }
            
            const exists = await checkEmailExists(email);
            if (exists) {
                showMessage('❌ Acest email este deja înregistrat. Folosește altul sau conectează-te.', 'error');
            } else {
                messageDiv.style.display = 'none';
            }
        });

        // Verificare nume în timp real (la pierderea focusului)
        nameInput.addEventListener('blur', async () => {
            if (isLogin) return; // doar în modul register
            const nume = nameInput.value.trim();
            if (!nume) return;
            
            const exists = await checkNameExists(nume);
            if (exists) {
                showMessage('❌ Acest nume este deja folosit. Alege altul.', 'error');
            } else {
                messageDiv.style.display = 'none';
            }
        });

        // Toggle între Login și Register
        switchBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            const forgotPasswordField = document.getElementById('forgot-password-field');
            if (isLogin) {
                nameField.style.display = 'none';
                confirmField.style.display = 'none';
                strengthContainer.style.display = 'none';
                weakWarning.style.display = 'none';
                forgotPasswordField.style.display = 'block';
                btnText.innerText = 'Conectare';
                switchMsg.innerText = 'Nu ai cont?';
                switchBtn.innerText = 'Înregistrează-te';
                authBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Conectare';
            } else {
                nameField.style.display = 'block';
                confirmField.style.display = 'block';
                strengthContainer.style.display = 'block';
                forgotPasswordField.style.display = 'none';
                btnText.innerText = 'Înregistrare';
                switchMsg.innerText = 'Ai deja cont?';
                switchBtn.innerText = 'Conectează-te';
                authBtn.innerHTML = '<i class="fas fa-user-plus"></i> Înregistrează-te';
            }
            messageDiv.style.display = 'none';
        });

        // Toggle parolă
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        toggleConfirm.addEventListener('click', () => {
            const type = confirmInput.type === 'password' ? 'text' : 'password';
            confirmInput.type = type;
            toggleConfirm.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        // Verificare putere parolă
        function checkStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            return strength;
        }

        passwordInput.addEventListener('input', () => {
            if (isLogin) return;
            const pwd = passwordInput.value;
            const strength = checkStrength(pwd);
            const percent = (strength / 4) * 100;
            strengthBar.style.width = percent + '%';
            
            if (strength === 0) {
                strengthBar.style.background = '#dc2626';
                strengthText.innerText = 'Prea slabă';
                weakWarning.style.display = 'flex';
            } else if (strength === 1) {
                strengthBar.style.background = '#f97316';
                strengthText.innerText = 'Slabă';
                weakWarning.style.display = 'flex';
            } else if (strength === 2) {
                strengthBar.style.background = '#eab308';
                strengthText.innerText = 'Medie';
                weakWarning.style.display = 'flex';
            } else if (strength === 3) {
                strengthBar.style.background = '#84cc16';
                strengthText.innerText = 'Bună';
                weakWarning.style.display = 'none';
            } else {
                strengthBar.style.background = '#22c55e';
                strengthText.innerText = 'Excelentă';
                weakWarning.style.display = 'none';
            }
        });

        // Submit form
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.style.display = 'none';

            if (!supabase) {
                showMessage('Eroare de conexiune. Reîncarcă pagina.', 'error');
                return;
            }

            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                showMessage('Completează email și parolă.', 'error');
                return;
            }

            // Validare format email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Format email invalid.', 'error');
                return;
            }

            if (!isLogin) {
                // ÎNREGISTRARE
                const nume = nameInput.value.trim();
                const confirm = confirmInput.value.trim();
                
                if (!nume || !confirm) {
                    showMessage('Completează toate câmpurile.', 'error');
                    return;
                }
                if (password !== confirm) {
                    showMessage('Parolele nu coincid.', 'error');
                    return;
                }
                if (password.length < 8) {
                    showMessage('Parola trebuie să aibă minim 8 caractere.', 'error');
                    return;
                }
                const strength = checkStrength(password);
                if (strength < 2) {
                    showMessage('Parola este prea slabă. Alege una mai sigură.', 'error');
                    return;
                }

                setLoading(true);

                // Verifică din nou email-ul (în caz că s-a modificat între timp)
                const exists = await checkEmailExists(email);
                if (exists) {
                    showMessage('❌ Acest email este deja înregistrat. Folosește altul sau conectează-te.', 'error');
                    setLoading(false);
                    return;
                }

                // Verifică dacă numele este deja folosit
                const numeExists = await checkNameExists(nume);
                if (numeExists) {
                    showMessage('❌ Acest nume este deja folosit. Alege altul.', 'error');
                    setLoading(false);
                    return;
                }

                try {
                    // 1. Creează utilizator în Auth
                    const { data: authData, error: authError } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: { nume: nume } // poți salva numele și în metadata
                        }
                    });

                    if (authError) {
                        if (authError.message.includes('already registered')) {
                            showMessage('Acest email este deja înregistrat.', 'error');
                        } else {
                            showMessage('Eroare: ' + authError.message, 'error');
                        }
                        setLoading(false);
                        return;
                    }

                    if (!authData.user) {
                        throw new Error('Utilizatorul nu a fost creat.');
                    }

                    // 2. Adaugă profil în tabela `users`
                    const { error: dbError } = await supabase
                        .from('users')
                        .insert([{
                            id: authData.user.id,
                            nume: nume,
                            email: email,
                            avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(nume)}&background=f59e0b&color=030712&size=128`,
                            created_at: new Date().toISOString()
                        }]);

                    if (dbError) {
                        console.error('Eroare la inserarea profilului:', dbError);
                        // Verificăm dacă e vorba de conflict unic (nume/email duplicate)
                        const isUniqueViolation = dbError.code === '23505' || (dbError.message && dbError.message.toLowerCase().includes('duplicate'));
                        if (isUniqueViolation) {
                            showMessage('❌ Acest nume sau email este deja folosit.', 'error');
                        } else {
                            showMessage('Eroare la salvarea profilului.', 'error');
                        }
                        setLoading(false);
                        return;
                    }

                    // Salvează sesiunea în localStorage
                    const userData = {
                        id: authData.user.id,
                        nume: nume,
                        email: email,
                        avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(nume)}&background=f59e0b&color=030712&size=128`
                    };
                    localStorage.setItem('currentUser', JSON.stringify(userData));
                    localStorage.setItem('isLoggedIn', 'true');

                    showMessage('✅ Cont creat cu succes! Redirecționare...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } catch (err) {
                    console.error(err);
                    showMessage('❌ Eroare neașteptată: ' + (err.message || 'încearcă din nou'), 'error');
                    setLoading(false);
                }
            } else {
                // LOGIN
                setLoading(true);
                try {
                    const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (authError) {
                        if (authError.message.includes('Invalid login credentials')) {
                            showMessage('❌ Email sau parolă incorecte.', 'error');
                        } else {
                            showMessage('❌ Eroare: ' + authError.message, 'error');
                        }
                        setLoading(false);
                        return;
                    }

                    if (!authData.user) {
                        throw new Error('Autentificare eșuată.');
                    }

                    // Obține datele profilului
                    const { data: user, error: dbError } = await supabase
                        .from('users')
                        .select('*')
                        .eq('id', authData.user.id)
                        .maybeSingle();

                    if (dbError || !user) {
                        showMessage('Profilul utilizatorului nu a fost găsit.', 'error');
                        setLoading(false);
                        return;
                    }

                    // Salvează sesiunea
                    const userData = {
                        id: authData.user.id,
                        nume: user.nume,
                        email: user.email,
                        avatar: user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.nume)}&background=f59e0b&color=030712&size=128`
                    };
                    localStorage.setItem('currentUser', JSON.stringify(userData));
                    localStorage.setItem('isLoggedIn', 'true');

                    showMessage('✅ Bun venit, ' + user.nume + '!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } catch (err) {
                    console.error(err);
                    showMessage('❌ Eroare: ' + (err.message || 'A apărut o problemă.'), 'error');
                    setLoading(false);
                }
            }
        });
    })();
    </script>
</body>
</html>
