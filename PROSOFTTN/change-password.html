<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schimbă parola • AI Verdict</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .box {
            background: rgba(15, 25, 45, 0.9);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(245, 158, 11, 0.3);
            border-radius: 48px;
            padding: 2.8rem 2.5rem;
            box-shadow: 0 30px 60px -20px #000;
            color: #e1e7f5;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fcd34d, #f59e0b);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #a0aec0;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .input-icon {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .input-icon i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #f59e0b;
            font-size: 1.2rem;
        }
        .input-icon input {
            width: 100%;
            padding: 1rem 3.5rem 1rem 3.2rem;
            background: #1e2b41;
            border: 2px solid #2f405c;
            border-radius: 60px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: 0.2s;
        }
        .input-icon input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }
        .toggle-eye {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }
        .toggle-eye:hover { color: #f59e0b; }
        .strength-indicator {
            display: none;
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-radius: 40px;
            background: rgba(30, 43, 65, 0.6);
            border: 2px solid #2f405c;
        }
        .strength-bar {
            width: 100%;
            height: 6px;
            background: #1a2535;
            border-radius: 3px;
            margin-bottom: 0.5rem;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            width: 0%;
            background: #22c55e;
            transition: 0.3s;
            border-radius: 3px;
        }
        .strength-text {
            font-size: 0.85rem;
            color: #a0aec0;
            font-weight: 500;
        }
        .btn {
            width: 100%;
            background: #f59e0b;
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #030712;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            transition: 0.2s;
            margin: 1.5rem 0;
        }
        .btn:hover { background: #fbbf24; transform: scale(1.02); box-shadow: 0 10px 25px -5px #f59e0b; }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .message {
            padding: 1rem;
            border-radius: 40px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .message.error { background: rgba(220, 38, 38, 0.2); border: 2px solid #dc2626; color: #fca5a5; }
        .message.success { background: rgba(34, 197, 94, 0.2); border: 2px solid #22c55e; color: #bbf7d0; }
        .back-link {
            text-align: center;
            margin-top: 2rem;
            color: #a0aec0;
        }
        .back-link a {
            color: #f59e0b;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link a:hover { text-decoration: underline; }
        .loader {
            border: 3px solid rgba(0,0,0,0.2);
            border-top: 3px solid #030712;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h1><i class="fas fa-key" style="color: #f59e0b; -webkit-text-fill-color: initial;"></i> Parola nouă</h1>
            <p class="subtitle">Creează o nouă parolă pentru contul tău</p>
            
            <div id="message" class="message"></div>
            
            <div class="input-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Parola nouă" required>
                <span class="toggle-eye" id="togglePassword"><i class="fas fa-eye"></i></span>
            </div>

            <div class="strength-indicator" id="strengthContainer">
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="strength-text" id="strengthText">Parolă slabă</div>
            </div>

            <div class="input-icon">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="confirm-password" placeholder="Confirmă parola" required>
                <span class="toggle-eye" id="toggleConfirm"><i class="fas fa-eye"></i></span>
            </div>
            
            <button id="change-btn" class="btn">
                <i class="fas fa-save"></i> Salvează parola nouă
            </button>
            
            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Înapoi la conectare</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function() {
        const SUPABASE_URL = "https://gjyaxaodghpzlpuzglcs.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqeWF4YW9kZ2hwemxwdXpnbGNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxOTAzMDEsImV4cCI6MjA4Nzc2NjMwMX0.JWLhsT_EchOT-MwPAzl0AOWsVUKvMnQ_LTyNRQOuk6s";
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            console.error('Supabase init failed:', e);
        }

        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm-password');
        const changeBtn = document.getElementById('change-btn');
        const messageDiv = document.getElementById('message');
        const strengthContainer = document.getElementById('strengthContainer');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const togglePassword = document.getElementById('togglePassword');
        const toggleConfirm = document.getElementById('toggleConfirm');

        // Verifică dacă suntem în recovery flow
        window.addEventListener('load', async () => {
            const hash = window.location.hash.substring(1);
            if (!hash || !hash.includes('type=recovery')) {
                showMessage('❌ Link de resetare invalid sau expirat. Te rugăm să soliciti un nou link.', 'error');
                changeBtn.disabled = true;
            }
        });

        function showMessage(text, type) {
            messageDiv.innerText = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        function checkStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength += 25;
            if (/[A-Z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password)) strength += 25;
            if (/[!@#$%^&*]/.test(password)) strength += 25;
            
            strengthFill.style.width = strength + '%';
            if (strength < 50) {
                strengthFill.style.background = '#dc2626';
                strengthText.innerText = '❌ Parolă slabă';
            } else if (strength < 75) {
                strengthFill.style.background = '#f59e0b';
                strengthText.innerText = '⚠️ Parolă acceptabilă';
            } else {
                strengthFill.style.background = '#22c55e';
                strengthText.innerText = '✅ Parolă puternică';
            }
            return strength >= 50;
        }

        function setLoading(loading) {
            if (loading) {
                changeBtn.disabled = true;
                changeBtn.innerHTML = '<div class="loader"></div> Se salvează...';
            } else {
                changeBtn.disabled = false;
                changeBtn.innerHTML = '<i class="fas fa-save"></i> Salvează parola nouă';
            }
        }

        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            if (password) {
                strengthContainer.style.display = 'block';
                checkStrength(password);
            } else {
                strengthContainer.style.display = 'none';
            }
        });

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.innerHTML = `<i class="fas fa-eye${type === 'password' ? '' : '-slash'}"></i>`;
        });

        toggleConfirm.addEventListener('click', () => {
            const type = confirmInput.type === 'password' ? 'text' : 'password';
            confirmInput.type = type;
            toggleConfirm.innerHTML = `<i class="fas fa-eye${type === 'password' ? '' : '-slash'}"></i>`;
        });

        changeBtn.addEventListener('click', async () => {
            const password = passwordInput.value.trim();
            const confirm = confirmInput.value.trim();

            if (!password || !confirm) {
                showMessage('❌ Completează ambele câmpuri.', 'error');
                return;
            }

            if (password !== confirm) {
                showMessage('❌ Parolele nu se potrivesc.', 'error');
                return;
            }

            if (!checkStrength(password)) {
                showMessage('❌ Parola trebuie să conțină: 8+ caractere, literă mare, cifră, simbol special.', 'error');
                return;
            }

            setLoading(true);

            try {
                const { error } = await supabase.auth.updateUser({ password: password });

                if (error) {
                    showMessage('❌ Eroare: ' + error.message, 'error');
                } else {
                    showMessage('✅ Parola a fost schimbată cu succes! Redirecționare...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                }
            } catch (err) {
                console.error(err);
                showMessage('❌ Eroare de conexiune. Încearcă mai târziu.', 'error');
            } finally {
                setLoading(false);
            }
        });

        // Enter key support
        confirmInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') changeBtn.click();
        });
    })();
    </script>
</body>
</html>
