<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schimbă parola • AI Verdict</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-base: #0a0c10;
            --bg-surface: #111318;
            --bg-elevated: #1a1d24;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --accent-glow: rgba(139, 92, 246, 0.25);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #2a2e36;
            --border-hover: #4b5563;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 16px;
            --radius-lg: 24px;
            --transition: all 0.2s ease;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 10px 30px var(--accent-glow);
        }

        body.light-mode {
            --bg-base: #f8fafc;
            --bg-surface: #ffffff;
            --bg-elevated: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --border-hover: #94a3b8;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: background-color 0.3s, color 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        /* Animație spectaculoasă de particule */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 15px;
            height: 15px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent);
            animation: floatParticle 8s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; transform: translateY(50vh) scale(1); }
            100% { transform: translateY(-10vh) scale(0); opacity: 0; }
        }

        .particle:nth-child(1) { left: 10%; width: 20px; height: 20px; animation-duration: 12s; }
        .particle:nth-child(2) { left: 20%; width: 12px; height: 12px; animation-duration: 15s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; width: 25px; height: 25px; animation-duration: 10s; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; width: 18px; height: 18px; animation-duration: 18s; animation-delay: 1s; }
        .particle:nth-child(5) { left: 50%; width: 22px; height: 22px; animation-duration: 14s; animation-delay: 3s; }
        .particle:nth-child(6) { left: 60%; width: 14px; height: 14px; animation-duration: 16s; animation-delay: 5s; }
        .particle:nth-child(7) { left: 70%; width: 19px; height: 19px; animation-duration: 11s; animation-delay: 2.5s; }
        .particle:nth-child(8) { left: 80%; width: 24px; height: 24px; animation-duration: 19s; animation-delay: 6s; }
        .particle:nth-child(9) { left: 90%; width: 16px; height: 16px; animation-duration: 13s; animation-delay: 1.5s; }
        .particle:nth-child(10) { left: 95%; width: 21px; height: 21px; animation-duration: 17s; animation-delay: 4.5s; }
        .particle:nth-child(11) { left: 15%; width: 23px; height: 23px; animation-duration: 20s; animation-delay: 0.5s; }
        .particle:nth-child(12) { left: 35%; width: 17px; height: 17px; animation-duration: 22s; animation-delay: 3.2s; }
        .particle:nth-child(13) { left: 55%; width: 13px; height: 13px; animation-duration: 24s; animation-delay: 1.8s; }
        .particle:nth-child(14) { left: 75%; width: 26px; height: 26px; animation-duration: 21s; animation-delay: 5.5s; }
        .particle:nth-child(15) { left: 85%; width: 15px; height: 15px; animation-duration: 18s; animation-delay: 2.2s; }

        .container {
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.6s ease;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .box {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.8rem 2.5rem;
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        h1 i {
            color: var(--accent);
            -webkit-text-fill-color: initial;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-icon {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .input-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 1.1rem;
            z-index: 1;
        }
        .input-icon input {
            width: 100%;
            padding: 1rem 3.5rem 1rem 3rem;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--transition);
            outline: none;
        }
        .input-icon input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .toggle-eye {
            position: absolute;
            right: 45px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            z-index: 2;
            font-size: 1.1rem;
        }
        .toggle-eye:hover {
            color: var(--accent);
        }

        .strength-indicator {
            display: none;
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-radius: var(--radius);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
        }
        .strength-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-bottom: 0.5rem;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            width: 0%;
            background: var(--danger);
            transition: width 0.3s, background 0.3s;
            border-radius: 3px;
        }
        .strength-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none;
            padding: 1rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }
        .btn:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        .message {
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .back-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-secondary);
        }
        .back-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }
        .back-link a:hover {
            color: var(--accent-light);
            text-decoration: underline;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="box">
            <h1><i class="fas fa-key"></i> Parola nouă</h1>
            <p class="subtitle">Creează o nouă parolă pentru contul tău</p>
            
            <div id="message" class="message"></div>
            
            <div class="input-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Parola nouă" required>
                <span class="toggle-eye" id="togglePassword"><i class="fas fa-eye"></i></span>
            </div>

            <div class="strength-indicator" id="strengthContainer">
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="strength-text" id="strengthText">Parolă slabă</div>
            </div>

            <div class="input-icon">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="confirm-password" placeholder="Confirmă parola" required>
                <span class="toggle-eye" id="toggleConfirm"><i class="fas fa-eye"></i></span>
            </div>
            
            <button id="change-btn" class="btn">
                <i class="fas fa-save"></i> Salvează parola nouă
            </button>
            
            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Înapoi la conectare</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function() {
        const SUPABASE_URL = "https://gjyaxaodghpzlpuzglcs.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqeWF4YW9kZ2hwemxwdXpnbGNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxOTAzMDEsImV4cCI6MjA4Nzc2NjMwMX0.JWLhsT_EchOT-MwPAzl0AOWsVUKvMnQ_LTyNRQOuk6s";
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            console.error('Supabase init failed:', e);
        }

        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm-password');
        const changeBtn = document.getElementById('change-btn');
        const messageDiv = document.getElementById('message');
        const strengthContainer = document.getElementById('strengthContainer');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const togglePassword = document.getElementById('togglePassword');
        const toggleConfirm = document.getElementById('toggleConfirm');

        window.addEventListener('load', async () => {
            // Extrage tokenii din hash
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');
            const type = params.get('type');

            if (type === 'recovery' && accessToken && refreshToken) {
                try {
                    // Setează sesiunea manual în Supabase
                    await supabase.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });
                    console.log('✅ Sesiune de recuperare setată cu succes');
                } catch (err) {
                    console.error('❌ Eroare la setarea sesiunii:', err);
                    showMessage('❌ Link invalid sau expirat. Te rugăm să soliciți un nou link.', 'error');
                    changeBtn.disabled = true;
                }
            } else {
                showMessage('❌ Link de resetare invalid sau expirat. Te rugăm să soliciți un nou link.', 'error');
                changeBtn.disabled = true;
            }
        });

        function showMessage(text, type) {
            messageDiv.innerText = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        function checkStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength += 25;
            if (/[A-Z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password)) strength += 25;
            if (/[!@#$%^&*]/.test(password)) strength += 25;
            
            strengthFill.style.width = strength + '%';
            if (strength < 50) {
                strengthFill.style.background = '#ef4444';
                strengthText.innerText = '❌ Parolă slabă';
            } else if (strength < 75) {
                strengthFill.style.background = '#f59e0b';
                strengthText.innerText = '⚠️ Parolă acceptabilă';
            } else {
                strengthFill.style.background = '#10b981';
                strengthText.innerText = '✅ Parolă puternică';
            }
            return strength >= 50;
        }

        function setLoading(loading) {
            if (loading) {
                changeBtn.disabled = true;
                changeBtn.innerHTML = '<div class="loader"></div> Se salvează...';
            } else {
                changeBtn.disabled = false;
                changeBtn.innerHTML = '<i class="fas fa-save"></i> Salvează parola nouă';
            }
        }

        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            if (password) {
                strengthContainer.style.display = 'block';
                checkStrength(password);
            } else {
                strengthContainer.style.display = 'none';
            }
        });

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.innerHTML = `<i class="fas fa-eye${type === 'password' ? '' : '-slash'}"></i>`;
        });

        toggleConfirm.addEventListener('click', () => {
            const type = confirmInput.type === 'password' ? 'text' : 'password';
            confirmInput.type = type;
            toggleConfirm.innerHTML = `<i class="fas fa-eye${type === 'password' ? '' : '-slash'}"></i>`;
        });

        changeBtn.addEventListener('click', async () => {
            const password = passwordInput.value.trim();
            const confirm = confirmInput.value.trim();

            if (!password || !confirm) {
                showMessage('❌ Completează ambele câmpuri.', 'error');
                return;
            }

            if (password !== confirm) {
                showMessage('❌ Parolele nu se potrivesc.', 'error');
                return;
            }

            if (!checkStrength(password)) {
                showMessage('❌ Parola trebuie să conțină: 8+ caractere, literă mare, cifră, simbol special.', 'error');
                return;
            }

            setLoading(true);

            try {
                // Acum sesiunea este deja setată, deci updateUser va funcționa
                const { error } = await supabase.auth.updateUser({ password: password });

                if (error) {
                    showMessage('❌ Eroare: ' + error.message, 'error');
                } else {
                    showMessage('✅ Parola a fost schimbată cu succes! Redirecționare...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                }
            } catch (err) {
                console.error(err);
                showMessage('❌ Eroare de conexiune. Încearcă mai târziu.', 'error');
            } finally {
                setLoading(false);
            }
        });

        confirmInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') changeBtn.click();
        });
    })();
    </script>
</body>
</html>
