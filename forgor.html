<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetare parolă • AI Verdict</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .box {
            background: rgba(15, 25, 45, 0.9);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(245, 158, 11, 0.3);
            border-radius: 48px;
            padding: 2.8rem 2.5rem;
            box-shadow: 0 30px 60px -20px #000;
            color: #e1e7f5;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fcd34d, #f59e0b);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #a0aec0;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .input-icon {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .input-icon i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #f59e0b;
            font-size: 1.2rem;
        }
        .input-icon input {
            width: 100%;
            padding: 1rem 1rem 1rem 3.2rem;
            background: #1e2b41;
            border: 2px solid #2f405c;
            border-radius: 60px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: 0.2s;
        }
        .input-icon input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }
        .btn {
            width: 100%;
            background: #f59e0b;
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #030712;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            transition: 0.2s;
            margin: 1.5rem 0;
        }
        .btn:hover { background: #fbbf24; transform: scale(1.02); box-shadow: 0 10px 25px -5px #f59e0b; }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .message {
            padding: 1rem;
            border-radius: 40px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .message.error { background: rgba(220, 38, 38, 0.2); border: 2px solid #dc2626; color: #fca5a5; }
        .message.success { background: rgba(34, 197, 94, 0.2); border: 2px solid #22c55e; color: #bbf7d0; }
        .back-link {
            text-align: center;
            margin-top: 2rem;
            color: #a0aec0;
        }
        .back-link a {
            color: #f59e0b;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link a:hover { text-decoration: underline; }
        .loader {
            border: 3px solid rgba(0,0,0,0.2);
            border-top: 3px solid #030712;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h1><i class="fas fa-lock" style="color: #f59e0b; -webkit-text-fill-color: initial;"></i> Resetează parola</h1>
            <p class="subtitle">Introdu email-ul tău și vom trimite un link de resetare</p>
            
            <div id="message" class="message"></div>
            
            <div class="input-icon">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email-ul tău" required>
            </div>
            
            <button id="reset-btn" class="btn">
                <i class="fas fa-paper-plane"></i> Trimite link de resetare
            </button>
            
            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Înapoi la conectare</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function() {
        const SUPABASE_URL = "https://gjyaxaodghpzlpuzglcs.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqeWF4YW9kZ2hwemxwdXpnbGNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxOTAzMDEsImV4cCI6MjA4Nzc2NjMwMX0.JWLhsT_EchOT-MwPAzl0AOWsVUKvMnQ_LTyNRQOuk6s";
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            console.error('Supabase init failed:', e);
        }

        const emailInput = document.getElementById('email');
        const resetBtn = document.getElementById('reset-btn');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type) {
            messageDiv.innerText = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        function setLoading(loading) {
            if (loading) {
                resetBtn.disabled = true;
                resetBtn.innerHTML = '<div class="loader"></div> Se trimite...';
            } else {
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Trimite link de resetare';
            }
        }

        resetBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            messageDiv.style.display = 'none';

            // Validare email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                showMessage('❌ Introduceti un email valid.', 'error');
                return;
            }

            setLoading(true);

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/change-password.html'
                });

                if (error) {
                    showMessage('❌ Eroare: ' + error.message, 'error');
                } else {
                    showMessage('✅ Link-ul de resetare a fost trimis pe email. Verifica inbox-ul!', 'success');
                    emailInput.value = '';
                }
            } catch (err) {
                console.error(err);
                showMessage('❌ Eroare de conexiune. Incearca mai tarziu.', 'error');
            } finally {
                setLoading(false);
            }
        });

        // Enter key support
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') resetBtn.click();
        });
    })();
    </script>
</body>
</html>
