<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Verdict • Autentificare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Design Premium - Dark & Light Mode */
        :root {
            --bg-base: #0a0c10;
            --bg-surface: #111318;
            --bg-elevated: #1a1d24;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --accent-glow: rgba(139, 92, 246, 0.25);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #2a2e36;
            --border-hover: #4b5563;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 16px;
            --radius-lg: 24px;
            --transition: all 0.2s ease;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 10px 30px var(--accent-glow);
        }

        body.light-mode {
            --bg-base: #f8fafc;
            --bg-surface: #ffffff;
            --bg-elevated: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --border-hover: #94a3b8;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: background-color 0.3s, color 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        /* Animație spectaculoasă de particule */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 25px;
            height: 25px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.6;
            box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
            animation: floatParticle 8s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; transform: translateY(50vh) scale(1); }
            100% { transform: translateY(-10vh) scale(0); opacity: 0; }
        }

        .particle:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-duration: 15s; animation-delay: 2s; width: 3px; height: 3px; }
        .particle:nth-child(3) { left: 30%; animation-duration: 10s; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; animation-duration: 18s; animation-delay: 1s; width: 4px; height: 4px; }
        .particle:nth-child(5) { left: 50%; animation-duration: 14s; animation-delay: 3s; }
        .particle:nth-child(6) { left: 60%; animation-duration: 16s; animation-delay: 5s; width: 3px; height: 3px; }
        .particle:nth-child(7) { left: 70%; animation-duration: 11s; animation-delay: 2.5s; }
        .particle:nth-child(8) { left: 80%; animation-duration: 19s; animation-delay: 6s; width: 5px; height: 5px; }
        .particle:nth-child(9) { left: 90%; animation-duration: 13s; animation-delay: 1.5s; }
        .particle:nth-child(10) { left: 95%; animation-duration: 17s; animation-delay: 4.5s; }

        .auth-container {
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.6s ease;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .box {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2.5rem;
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 2rem;
        }

        .theme-toggle {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 30px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        h1 i {
            color: var(--accent);
            -webkit-text-fill-color: initial;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-icon {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .input-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 1.1rem;
            z-index: 1;
        }
        .input-icon input,
        .input-icon select {
            width: 100%;
            padding: 1rem 2.5rem 1rem 3rem;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--transition);
            outline: none;
            appearance: none;
        }
        .input-icon input:focus,
        .input-icon select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        .input-icon select {
            cursor: pointer;
        }

        .toggle-eye {
            position: absolute;
            right: 45px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            z-index: 2;
            font-size: 1.1rem;
        }
        .toggle-eye:hover {
            color: var(--accent);
        }

        .radio-group {
            display: flex;
            gap: 0.8rem;
            margin: 1.5rem 0 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-secondary);
            background: var(--bg-elevated);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }
        .radio-group label:hover {
            border-color: var(--accent);
            background: var(--bg-surface);
        }
        .radio-group input[type="radio"] {
            accent-color: var(--accent);
            width: 14px;
            height: 14px;
        }

        /* Stil pentru selectorul de județ */
        .judet-selector {
            margin-bottom: 1.5rem;
        }
        .judet-selector select {
            width: 100%;
            padding: 1rem;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--transition);
            outline: none;
            cursor: pointer;
        }
        .judet-selector select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        /* Input pentru anul nașterii */
        .input-icon input[type="number"] {
            padding-right: 1rem;
        }

        .forgot-link {
            text-align: right;
            margin-bottom: 1.5rem;
        }
        .forgot-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
        }
        .forgot-link a:hover {
            color: var(--accent);
        }

        .password-strength {
            margin-top: -0.5rem;
            margin-bottom: 1.5rem;
        }
        .strength-bar {
            height: 6px;
            width: 0%;
            background: var(--danger);
            border-radius: 10px;
            transition: width 0.3s, background 0.3s;
        }
        .strength-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
        }

        .weak-warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--warning);
            border-radius: var(--radius);
            padding: 0.8rem 1rem;
            margin-bottom: 1.5rem;
            color: var(--warning);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none;
            padding: 1rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin: 1.5rem 0 1rem;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }
        .auth-btn:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        .switch-text {
            text-align: center;
            color: var(--text-secondary);
        }
        .switch-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: underline;
            transition: var(--transition);
        }
        .switch-btn:hover {
            color: var(--accent-light);
        }

        .message {
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }
        .message.info {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 0.5;
        }
    </style>
</head>

            isLogin = !isLogin;
            if (isLogin) {
                nameField.style.display = 'none';
                confirmField.style.display = 'none';
                demographicFields.style.display = 'none';
                strengthContainer.style.display = 'none';
                weakWarning.style.display = 'none';
                forgotField.style.display = 'block';
                btnText.innerText = translations[currentLang].login;
                switchMsg.innerText = translations[currentLang].dontHaveAccount;
                switchBtn.innerText = translations[currentLang].register;
            } else {
                nameField.style.display = 'block';
                confirmField.style.display = 'block';
                demographicFields.style.display = 'block';
                strengthContainer.style.display = 'block';
                forgotField.style.display = 'none';
                btnText.innerText = translations[currentLang].register;
                switchMsg.innerText = translations[currentLang].alreadyHaveAccount;
                switchBtn.innerText = translations[currentLang].login;
            }
            messageDiv.style.display = 'none';
            updateUIText();
        });

        // Toggle parolă
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        toggleConfirm.addEventListener('click', () => {
            const type = confirmInput.type === 'password' ? 'text' : 'password';
            confirmInput.type = type;
            toggleConfirm.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        // Verificare putere parolă
        function checkStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            return strength;
        }

        passwordInput.addEventListener('input', () => {
            if (isLogin) return;
            const pwd = passwordInput.value;
            const strength = checkStrength(pwd);
            const percent = (strength / 4) * 100;
            strengthBar.style.width = percent + '%';

            if (strength === 0) {
                strengthBar.style.background = '#ef4444';
                strengthText.innerText = 'Prea slabă';
                weakWarning.style.display = 'flex';
            } else if (strength === 1) {
                strengthBar.style.background = '#f97316';
                strengthText.innerText = 'Slabă';
                weakWarning.style.display = 'flex';
            } else if (strength === 2) {
                strengthBar.style.background = '#eab308';
                strengthText.innerText = 'Medie';
                weakWarning.style.display = 'flex';
            } else if (strength === 3) {
                strengthBar.style.background = '#84cc16';
                strengthText.innerText = 'Bună';
                weakWarning.style.display = 'none';
            } else {
                strengthBar.style.background = '#10b981';
                strengthText.innerText = 'Excelentă';
                weakWarning.style.display = 'none';
            }
        });

        // Funcții ajutătoare
        function showMessage(text, type) {
            messageDiv.innerText = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        function setLoading(loading) {
            if (loading) {
                authBtn.disabled = true;
                authBtn.innerHTML = '<div class="loader"></div> Se procesează...';
            } else {
                authBtn.disabled = false;
                const icon = isLogin ? 'fa-sign-in-alt' : 'fa-user-plus';
                authBtn.innerHTML = `<i class="fas ${icon}"></i> <span id="btn-text">${isLogin ? translations[currentLang].login : translations[currentLang].register}</span>`;
            }
        }

        async function checkEmailExists(email) {
            if (!email) return false;
            try {
                const { data } = await supabase
                    .from('users')
                    .select('email')
                    .eq('email', email)
                    .maybeSingle();
                return !!data;
            } catch { return false; }
        }

        async function checkNameExists(nume) {
            if (!nume) return false;
            try {
                const { data } = await supabase
                    .from('users')
                    .select('nume')
                    .eq('nume', nume)
                    .maybeSingle();
                return !!data;
            } catch { return false; }
        }

        // Submit form
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.style.display = 'none';

            if (!supabase) {
                showMessage('Eroare de conexiune.', 'error');
                return;
            }

            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!email || !password || !emailRegex.test(email)) {
                showMessage(translations[currentLang].invalidEmail, 'error');
                return;
            }

            if (!isLogin) {
                // Register
                const nume = nameInput.value.trim();
                const confirm = confirmInput.value.trim();
                const gender = Array.from(genderRadios).find(r => r.checked)?.value;
                const country = judetSelect.value;
                const birthYear = birthYearInput.value.trim();

                if (!nume || !confirm || !gender || !country || !birthYear) {
                    showMessage(translations[currentLang].allFieldsRequired, 'error');
                    return;
                }
                if (password !== confirm) {
                    showMessage(translations[currentLang].passwordsDoNotMatch, 'error');
                    return;
                }
                if (password.length < 8 || checkStrength(password) < 2) {
                    showMessage(translations[currentLang].weakPassword, 'error');
                    return;
                }

                setLoading(true);

                // Verifică email și nume
                if (await checkEmailExists(email)) {
                    showMessage(translations[currentLang].emailExists, 'error');
                    setLoading(false);
                    return;
                }
                if (await checkNameExists(nume)) {
                    showMessage(translations[currentLang].nameExists, 'error');
                    setLoading(false);
                    return;
                }

                try {
                    const { data: authData, error: authError } = await supabase.auth.signUp({
                        email, password,
                        options: { data: { nume } }
                    });
                    if (authError) throw authError;

                    // Adaugă profil în tabela users cu coloanele corecte
                    const { error: dbError } = await supabase
                        .from('users')
                        .insert([{
                            id: authData.user.id,
                            nume,
                            email,
                            gender,
                            country,
                            birth_year: birthYear ? parseInt(birthYear) : null,
                            avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(nume)}&background=8b5cf6&color=fff&size=128`,
                            points: 0,
                            level: 1
                        }]);

                    if (dbError) throw dbError;

                    // Salvează datele utilizatorului în localStorage (inclusiv câmpurile demografice)
                    localStorage.setItem('currentUser', JSON.stringify({
                        id: authData.user.id,
                        nume,
                        email,
                        avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(nume)}&background=8b5cf6&color=fff&size=128`,
                        points: 0,
                        level: 1,
                        gender,
                        country,
                        birth_year: birthYear ? parseInt(birthYear) : null
                    }));
                    localStorage.setItem('isLoggedIn', 'true');

                    showMessage(translations[currentLang].registerSuccess, 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } catch (err) {
                    showMessage(err.message, 'error');
                } finally {
                    setLoading(false);
                }
            } else {
                // Login
                setLoading(true);
                try {
                    const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email, password });
                    if (authError) throw authError;

                    const { data: user, error: dbError } = await supabase
                        .from('users')
                        .select('*')
                        .eq('id', authData.user.id)
                        .single();

                    if (dbError || !user) throw new Error('Profil utilizator negăsit');

                    // Salvează toate câmpurile utile în localStorage
                    localStorage.setItem('currentUser', JSON.stringify({
                        id: user.id,
                        nume: user.nume,
                        email: user.email,
                        avatar: user.avatar,
                        points: user.points || 0,
                        level: user.level || 1,
                        gender: user.gender,
                        country: user.country,
                        birth_year: user.birth_year
                    }));
                    localStorage.setItem('isLoggedIn', 'true');

                    showMessage(translations[currentLang].loginSuccess + ', ' + user.nume + '!', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } catch (err) {
                    showMessage(err.message, 'error');
                } finally {
                    setLoading(false);
                }
            }
        });

        // Inițializare text
        updateUIText();
    })();
    </script>
</body>
</html>
