<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetare parolă • AI Verdict</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Design Premium - Dark & Light Mode */
        :root {
            --bg-base: #0a0c10;
            --bg-surface: #111318;
            --bg-elevated: #1a1d24;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --accent-glow: rgba(139, 92, 246, 0.25);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #2a2e36;
            --border-hover: #4b5563;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 16px;
            --radius-lg: 24px;
            --transition: all 0.2s ease;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 10px 30px var(--accent-glow);
        }

        body.light-mode {
            --bg-base: #f8fafc;
            --bg-surface: #ffffff;
            --bg-elevated: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --border-hover: #94a3b8;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: background-color 0.3s, color 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        /* Animație spectaculoasă de particule */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 15px;
            height: 15px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent);
            animation: floatParticle 8s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; transform: translateY(50vh) scale(1); }
            100% { transform: translateY(-10vh) scale(0); opacity: 0; }
        }

        /* Dimensiuni variabile pentru particule */
        .particle:nth-child(1) { left: 10%; width: 20px; height: 20px; animation-duration: 12s; }
        .particle:nth-child(2) { left: 20%; width: 12px; height: 12px; animation-duration: 15s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; width: 25px; height: 25px; animation-duration: 10s; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; width: 18px; height: 18px; animation-duration: 18s; animation-delay: 1s; }
        .particle:nth-child(5) { left: 50%; width: 22px; height: 22px; animation-duration: 14s; animation-delay: 3s; }
        .particle:nth-child(6) { left: 60%; width: 14px; height: 14px; animation-duration: 16s; animation-delay: 5s; }
        .particle:nth-child(7) { left: 70%; width: 19px; height: 19px; animation-duration: 11s; animation-delay: 2.5s; }
        .particle:nth-child(8) { left: 80%; width: 24px; height: 24px; animation-duration: 19s; animation-delay: 6s; }
        .particle:nth-child(9) { left: 90%; width: 16px; height: 16px; animation-duration: 13s; animation-delay: 1.5s; }
        .particle:nth-child(10) { left: 95%; width: 21px; height: 21px; animation-duration: 17s; animation-delay: 4.5s; }
        .particle:nth-child(11) { left: 15%; width: 23px; height: 23px; animation-duration: 20s; animation-delay: 0.5s; }
        .particle:nth-child(12) { left: 35%; width: 17px; height: 17px; animation-duration: 22s; animation-delay: 3.2s; }
        .particle:nth-child(13) { left: 55%; width: 13px; height: 13px; animation-duration: 24s; animation-delay: 1.8s; }
        .particle:nth-child(14) { left: 75%; width: 26px; height: 26px; animation-duration: 21s; animation-delay: 5.5s; }
        .particle:nth-child(15) { left: 85%; width: 15px; height: 15px; animation-duration: 18s; animation-delay: 2.2s; }

        .container {
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.6s ease;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .box {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.8rem 2.5rem;
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        h1 i {
            color: var(--accent);
            -webkit-text-fill-color: initial;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-icon {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .input-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 1.1rem;
            z-index: 1;
        }
        .input-icon input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--transition);
            outline: none;
        }
        .input-icon input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none;
            padding: 1rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }
        .btn:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        .message {
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .back-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-secondary);
        }
        .back-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }
        .back-link a:hover {
            color: var(--accent-light);
            text-decoration: underline;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Animație spectaculoasă de particule -->
    <div class="bg-animation">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="box">
            <h1><i class="fas fa-lock"></i> <span id="title">Resetează parola</span></h1>
            <p class="subtitle" id="subtitle">Introdu email-ul tău și vom trimite un link de resetare</p>
            
            <div id="message" class="message"></div>
            
            <div class="input-icon">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email" required>
            </div>
            
            <button id="reset-btn" class="btn">
                <i class="fas fa-paper-plane"></i> <span id="btnText">Trimite link de resetare</span>
            </button>
            
            <div class="back-link">
                <a href="index.html" id="backLink"><i class="fas fa-arrow-left"></i> Înapoi la conectare</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function() {
        const SUPABASE_URL = "https://gjyaxaodghpzlpuzglcs.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqeWF4YW9kZ2hwemxwdXpnbGNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxOTAzMDEsImV4cCI6MjA4Nzc2NjMwMX0.JWLhsT_EchOT-MwPAzl0AOWsVUKvMnQ_LTyNRQOuk6s";
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            console.error('Supabase init failed:', e);
        }

        // Elemente DOM
        const emailInput = document.getElementById('email');
        const resetBtn = document.getElementById('reset-btn');
        const messageDiv = document.getElementById('message');
        const btnText = document.getElementById('btnText');

        // Setare text static (română)
        const texts = {
            title: "Resetează parola",
            subtitle: "Introdu email-ul tău și vom trimite un link de resetare",
            btnText: "Trimite link de resetare",
            backLink: "Înapoi la conectare",
            success: "✅ Link-ul de resetare a fost trimis pe email. Verifică inbox-ul!",
            error: "❌ Eroare: ",
            invalidEmail: "❌ Te rugăm să introduci un email valid."
        };

        // Actualizare UI (dacă e nevoie)
        document.getElementById('title').innerText = texts.title;
        document.getElementById('subtitle').innerText = texts.subtitle;
        btnText.innerText = texts.btnText;
        document.getElementById('backLink').innerHTML = `<i class="fas fa-arrow-left"></i> ${texts.backLink}`;

        function showMessage(text, type) {
            messageDiv.innerText = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        function setLoading(loading) {
            if (loading) {
                resetBtn.disabled = true;
                resetBtn.innerHTML = '<div class="loader"></div> Se trimite...';
            } else {
                resetBtn.disabled = false;
                resetBtn.innerHTML = `<i class="fas fa-paper-plane"></i> <span id="btnText">${texts.btnText}</span>`;
            }
        }

        resetBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            messageDiv.style.display = 'none';

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                showMessage(texts.invalidEmail, 'error');
                return;
            }

            setLoading(true);

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/change-password.html'
                });

                if (error) {
                    showMessage(texts.error + error.message, 'error');
                } else {
                    showMessage(texts.success, 'success');
                    emailInput.value = '';
                }
            } catch (err) {
                console.error(err);
                showMessage(texts.error + 'Conexiune eșuată.', 'error');
            } finally {
                setLoading(false);
            }
        });

        // Enter key support
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') resetBtn.click();
        });
    })();
    </script>
</body>
</html>
